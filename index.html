<body>
<div id="gameContainer">
    <div id="menuScreen">
        <div class="menu-header">
            <h1>NEON CRASH</h1>
            <p>50 BALL MISSIONS</p>
        </div>
        <div class="grid-levels" id="levelsGrid"></div>
    </div>

    <div class="ui-layer">
        <button id="backToMenuBtn">MAP</button>
        <div class="ui-item" id="scoreBox"><span class="ui-label">SCORE</span><span class="ui-val" id="score">0</span></div>
        <div class="ui-item" id="targetBox"><span class="ui-label">OBJECTIVE</span><span class="ui-val" id="target">-</span></div>
        <div class="ui-item" id="movesBox"><span class="ui-label" id="limitLabel">MOVES</span><span class="ui-val" id="moves">0</span></div>
    </div>

    <div id="canvasContainer">
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
// ═══════════════════════════════════
//  INLINE SERVICE WORKER registration
// ═══════════════════════════════════
if ('serviceWorker' in navigator) {
    const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => clients.claim());
self.addEventListener('fetch', e => e.respondWith(
    caches.open('neon-crash-v1').then(cache =>
        cache.match(e.request).then(r => r || fetch(e.request).then(res => {
            cache.put(e.request, res.clone()); return res;
        }))
    )
));`;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swURL = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swURL).catch(() => {});
}

// ═══════════════════════════════════
//  GAME
// ═══════════════════════════════════
const canvas  = document.getElementById("gameCanvas");
const ctx     = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const targetEl= document.getElementById("target");
const movesEl = document.getElementById("moves");
const limitLabelEl  = document.getElementById("limitLabel");
const menuScreen    = document.getElementById("menuScreen");
const levelsGrid    = document.getElementById("levelsGrid");
const backToMenuBtn = document.getElementById("backToMenuBtn");

const BOARD_SIZE = 7;
let cellSize = 50;
const ANIM_SPEED = 0.22;

// ── VIVID neon colours (fully saturated, no white glow centre) ──────────────
// Base  : pure saturated hue
// Light : +30% brightness tint for the specular hotspot
// Dark  : very deep shade for the shadow edge of the sphere
const CANDIES       = ["#ff0044","#00eeff","#aa00ff","#00ff44","#ff8800","#ff00bb"];
const CANDIE_LIGHTER= ["#ff4477","#66f9ff","#cc55ff","#55ff88","#ffbb44","#ff55dd"];
const CANDIE_DARKER = ["#5a0018","#00404d","#360060","#00500f","#5a2c00","#5a003e"];
const CANDY_NAMES   = ["Neon Red","Neon Cyan","Neon Violet","Neon Green","Neon Orange","Neon Pink"];

// Pre-computed glow colours (same hue, semi-transparent for canvas shadow)
const CANDIE_GLOW   = ["rgba(255,0,68,0.7)","rgba(0,238,255,0.7)","rgba(170,0,255,0.7)",
                        "rgba(0,255,68,0.7)","rgba(255,136,0,0.7)","rgba(255,0,187,0.7)"];

let score=0, moves=0, targetScore=0, currentLevel=1;
let gameState="menu", endReason="", board=[];
let levelMode="score", collectTargetType=0, collectCount=0;
let timeRemaining=0, timerInterval=null;

// ── LEVEL DEFINITIONS ────────────────────────────────────────────────────────
let levelsData = {};
for(let i=1;i<=50;i++){
    let modes=["score","collect","time"];
    let chosenMode=modes[(i-1)%3];
    levelsData[i]={
        mode:chosenMode,
        targetScore: 400+(i*180),
        moves: Math.max(30-Math.floor(i*0.4),14),
        collectType:(i-1)%6,
        collectQty: 8+Math.floor(i*0.7),
        duration: Math.max(50-Math.floor(i*0.5),25)
    };
}

let maxUnlockedLevel = parseInt(localStorage.getItem("crash_max_level"))||1;

// ── CANDY CLASS ──────────────────────────────────────────────────────────────
class Candy {
    constructor(r,c,typeIndex){
        this.r=r; this.c=c; this.typeIndex=typeIndex;
        this.color      = CANDIES[typeIndex];
        this.lightColor = CANDIE_LIGHTER[typeIndex];
        this.darkColor  = CANDIE_DARKER[typeIndex];
        this.glowColor  = CANDIE_GLOW[typeIndex];
        this.x=c*cellSize; this.y=r*cellSize;
        this.targetX=this.x; this.targetY=this.y;
        this.isMatched=false;
    }
    update(){
        this.x += (this.targetX-this.x)*ANIM_SPEED;
        this.y += (this.targetY-this.y)*ANIM_SPEED;
    }
    setTarget(r,c){
        this.r=r; this.c=c;
        this.targetX=c*cellSize; this.targetY=r*cellSize;
    }

    // ── CRISP VIVID SPHERE ────────────────────────────────────────────────
    // Key changes vs original:
    //   1. Radial gradient hotspot placed farther off-centre (more 3-D pop)
    //   2. NO white centre stop — keeps colour pure & saturated
    //   3. ctx.shadowBlur for neon outer glow (replaces the blurry centre haze)
    //   4. Smaller specular ellipse, higher opacity (sharper highlight)
    //   5. Thin rim-light stroke in the lighter colour for crispness
    draw(cx,cy,size){
        ctx.save();

        // ── outer neon glow (canvas shadow trick — cheap & sharp) ──
        ctx.shadowColor  = this.glowColor;
        ctx.shadowBlur   = size * 0.9;      // tight glow, not spreaded fog

        // ── sphere body gradient (pure colours, no white wash) ──
        // Hotspot at upper-left ~30% of radius from centre
        let grad = ctx.createRadialGradient(
            cx - size*0.28, cy - size*0.28, size*0.04,   // highlight focal point
            cx,              cy,              size*0.95   // edge
        );
        grad.addColorStop(0,   this.lightColor);  // bright saturated highlight
        grad.addColorStop(0.45, this.color);       // pure neon midtone
        grad.addColorStop(0.82, this.darkColor);   // deep shadow
        grad.addColorStop(1,   "#04060c");         // rim dark

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, size*0.87, 0, Math.PI*2);
        ctx.fill();

        // ── crisp rim-light stroke (lighter shade) ──
        ctx.shadowBlur  = 0;   // turn off shadow for the stroke
        ctx.strokeStyle = this.lightColor;
        ctx.lineWidth   = size * 0.06;
        ctx.globalAlpha = 0.25;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // ── sharp specular highlight (jelly-glass reflection) ──
        ctx.shadowBlur  = 0;
        let spec = ctx.createRadialGradient(
            cx - size*0.27, cy - size*0.27, 0,
            cx - size*0.22, cy - size*0.22, size*0.32
        );
        spec.addColorStop(0,   "rgba(255,255,255,0.72)");
        spec.addColorStop(0.5, "rgba(255,255,255,0.18)");
        spec.addColorStop(1,   "rgba(255,255,255,0)");
        ctx.fillStyle = spec;
        ctx.beginPath();
        // tight oval highlight — sharper than original large ellipse
        ctx.ellipse(cx-size*0.25, cy-size*0.25, size*0.22, size*0.10, Math.PI/4, 0, Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

// ── MENU ─────────────────────────────────────────────────────────────────────
function buildMenu(){
    levelsGrid.innerHTML="";
    for(let i=1;i<=50;i++){
        const btn=document.createElement("div");
        btn.classList.add("level-btn");
        let modeLabel=levelsData[i].mode==="collect"?"COLLECT":levelsData[i].mode==="time"?"TIME":"SCORE";
        if(i<=maxUnlockedLevel){
            btn.classList.add("unlocked");
            btn.innerHTML=`<span class="num">${i}</span><span class="type-badge">${modeLabel}</span>`;
            btn.addEventListener("click",()=>startLevel(i));
        } else {
            btn.classList.add("locked");
            btn.innerHTML=`<span class="num">🔒</span><span class="type-badge">LVL ${i}</span>`;
        }
        levelsGrid.appendChild(btn);
    }
}

// ── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD(){
    scoreEl.innerText=score;
    if(levelMode==="score"){
        limitLabelEl.innerText="MOVES"; movesEl.innerText=moves;
        targetEl.innerHTML=`<span style="font-size:11px;">Target Score</span><br>${targetScore}`;
    } else if(levelMode==="collect"){
        limitLabelEl.innerText="MOVES"; movesEl.innerText=moves;
        let cName=CANDY_NAMES[collectTargetType];
        targetEl.innerHTML=`<span style="font-size:10px;color:${CANDIES[collectTargetType]}">${cName} Left</span><br>${collectCount}`;
    } else {
        limitLabelEl.innerText="TIME"; movesEl.innerText=timeRemaining+"s";
        targetEl.innerHTML=`<span style="font-size:11px;">Target Score</span><br>${targetScore}`;
    }
}

// ── LEVEL START ───────────────────────────────────────────────────────────────
function startLevel(lvl){
    clearInterval(timerInterval);
    currentLevel=lvl;
    let data=levelsData[lvl];
    levelMode=data.mode; score=0;
    targetScore=data.targetScore; moves=data.moves;
    collectTargetType=data.collectType; collectCount=data.collectQty;
    timeRemaining=data.duration;

    if(levelMode==="time"){
        timerInterval=setInterval(()=>{
            if(["idle","falling","checking","swapping"].includes(gameState)){
                timeRemaining--; updateHUD();
                if(timeRemaining<=0){ clearInterval(timerInterval); checkGameEndState(true); }
            }
        },1000);
    }
    resize(); initBoard();
    menuScreen.style.display="none";
    gameState="idle"; updateHUD();
}

// ── BOARD INIT ────────────────────────────────────────────────────────────────
function initBoard(){
    board=[];
    for(let r=0;r<BOARD_SIZE;r++){
        board[r]=[];
        for(let c=0;c<BOARD_SIZE;c++){
            let indices=[0,1,2,3,4,5];
            if(c>=2&&board[r][c-1].typeIndex===board[r][c-2].typeIndex)
                indices=indices.filter(i=>i!==board[r][c-1].typeIndex);
            if(r>=2&&board[r-1][c].typeIndex===board[r-2][c].typeIndex)
                indices=indices.filter(i=>i!==board[r-1][c].typeIndex);
            let idx=indices[Math.floor(Math.random()*indices.length)];
            board[r][c]=new Candy(r,c,idx);
        }
    }
}

// ── TOUCH INPUT ───────────────────────────────────────────────────────────────
let startTouchX=0,startTouchY=0,selectedCandy=null;

canvas.addEventListener("touchstart",(e)=>{
    if(gameState!=="idle") return;
    const rect=canvas.getBoundingClientRect();
    startTouchX=e.touches[0].clientX-rect.left;
    startTouchY=e.touches[0].clientY-rect.top;
    let c=Math.floor(startTouchX/cellSize), r=Math.floor(startTouchY/cellSize);
    if(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE) selectedCandy=board[r][c];
});

canvas.addEventListener("touchmove",(e)=>{
    if(gameState!=="idle"||!selectedCandy) return;
    const rect=canvas.getBoundingClientRect();
    let diffX=(e.touches[0].clientX-rect.left)-startTouchX;
    let diffY=(e.touches[0].clientY-rect.top)-startTouchY;
    if(Math.abs(diffX)>22||Math.abs(diffY)>22){
        let r1=selectedCandy.r,c1=selectedCandy.c,r2=r1,c2=c1;
        if(Math.abs(diffX)>Math.abs(diffY)) c2=diffX>0?c1+1:c1-1;
        else r2=diffY>0?r1+1:r1-1;
        if(r2>=0&&r2<BOARD_SIZE&&c2>=0&&c2<BOARD_SIZE) executeSwap(r1,c1,r2,c2);
        selectedCandy=null;
    }
});

// ── GAME LOGIC ────────────────────────────────────────────────────────────────
function executeSwap(r1,c1,r2,c2){
    gameState="swapping";
    if(levelMode!=="time") moves--;
    updateHUD();
    let c1c=board[r1][c1],c2c=board[r2][c2];
    board[r1][c1]=c2c; board[r2][c2]=c1c;
    c1c.setTarget(r2,c2); c2c.setTarget(r1,c1);
    setTimeout(()=>{
        if(!checkMatches()){
            board[r1][c1]=c1c; board[r2][c2]=c2c;
            c1c.setTarget(r1,c1); c2c.setTarget(r2,c2);
            if(levelMode!=="time"){ moves++; updateHUD(); }
            setTimeout(()=>{ gameState="idle"; },200);
        } else { popMatches(); }
    },220);
}

function checkMatches(){
    let matched=false;
    for(let r=0;r<BOARD_SIZE;r++)
        for(let c=0;c<BOARD_SIZE-2;c++)
            if(board[r][c]&&board[r][c+1]&&board[r][c+2]){
                let idx=board[r][c].typeIndex;
                if(board[r][c+1].typeIndex===idx&&board[r][c+2].typeIndex===idx){
                    board[r][c].isMatched=board[r][c+1].isMatched=board[r][c+2].isMatched=true;
                    matched=true;
                }
            }
    for(let c=0;c<BOARD_SIZE;c++)
        for(let r=0;r<BOARD_SIZE-2;r++)
            if(board[r][c]&&board[r+1][c]&&board[r+2][c]){
                let idx=board[r][c].typeIndex;
                if(board[r+1][c].typeIndex===idx&&board[r+2][c].typeIndex===idx){
                    board[r][c].isMatched=board[r+1][c].isMatched=board[r+2][c].isMatched=true;
                    matched=true;
                }
            }
    return matched;
}

function popMatches(){
    gameState="checking";
    let popped=0;
    for(let r=0;r<BOARD_SIZE;r++)
        for(let c=0;c<BOARD_SIZE;c++)
            if(board[r][c]&&board[r][c].isMatched){
                if(levelMode==="collect"&&board[r][c].typeIndex===collectTargetType)
                    collectCount=Math.max(0,collectCount-1);
                board[r][c]=null; popped++;
            }
    if(popped>0){ score+=popped*15; updateHUD(); setTimeout(applyGravityAndRefill,160); }
}

function applyGravityAndRefill(){
    gameState="falling";
    for(let c=0;c<BOARD_SIZE;c++){
        for(let r=BOARD_SIZE-1;r>=0;r--)
            if(board[r][c]===null)
                for(let k=r-1;k>=0;k--)
                    if(board[k][c]!==null){
                        board[r][c]=board[k][c]; board[k][c]=null;
                        board[r][c].setTarget(r,c); break;
                    }
        let missing=0;
        for(let r=0;r<BOARD_SIZE;r++)
            if(board[r][c]===null){
                missing++;
                let rIdx=Math.floor(Math.random()*CANDIES.length);
                let nc=new Candy(r,c,rIdx);
                nc.y=-missing*cellSize; board[r][c]=nc; nc.setTarget(r,c);
            }
    }
    setTimeout(()=>{ if(checkMatches()) popMatches(); else checkGameEndState(false); },250);
}

function checkGameEndState(timeForceEnd){
    let isWin=false,isLose=false;
    if(levelMode==="score"){ if(score>=targetScore) isWin=true; else if(moves<=0) isLose=true; }
    else if(levelMode==="collect"){ if(collectCount<=0) isWin=true; else if(moves<=0) isLose=true; }
    else { if(score>=targetScore) isWin=true; else if(timeForceEnd||timeRemaining<=0) isLose=true; }

    if(isWin){
        clearInterval(timerInterval); gameState="end"; endReason="win";
        if(currentLevel===maxUnlockedLevel&&maxUnlockedLevel<50){
            maxUnlockedLevel++; localStorage.setItem("crash_max_level",maxUnlockedLevel);
        }
    } else if(isLose){
        clearInterval(timerInterval); gameState="end"; endReason="lose";
    } else { gameState="idle"; }
    updateHUD();
}

// ── RESIZE ───────────────────────────────────────────────────────────────────
function resize(){
    const container=document.getElementById("canvasContainer");
    let size=Math.min(container.clientWidth,container.clientHeight)-10;
    if(size<280) size=280;
    canvas.width=size; canvas.height=size;
    cellSize=size/BOARD_SIZE;
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function updateAndDraw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // subtle grid lines
    ctx.strokeStyle="rgba(255,255,255,0.02)"; ctx.lineWidth=1;
    for(let i=0;i<=BOARD_SIZE;i++){
        ctx.beginPath(); ctx.moveTo(i*cellSize,0); ctx.lineTo(i*cellSize,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i*cellSize); ctx.lineTo(canvas.width,i*cellSize); ctx.stroke();
    }

    if(gameState!=="menu"){
        for(let r=0;r<BOARD_SIZE;r++)
            for(let c=0;c<BOARD_SIZE;c++){
                let candy=board[r][c];
                if(candy){ candy.update(); candy.draw(candy.x+cellSize/2,candy.y+cellSize/2,cellSize*0.44); }
            }
    }

    if(gameState==="end"){
        ctx.fillStyle="rgba(3,5,10,0.95)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.textAlign="center";
        if(endReason==="win"){
            ctx.font="bold 28px sans-serif"; ctx.fillStyle="#00ffcc";
            ctx.shadowColor="#00ffcc"; ctx.shadowBlur=20;
            ctx.fillText("STAGE CLEAR!",canvas.width/2,canvas.height/2-20);
        } else {
            ctx.font="bold 28px sans-serif"; ctx.fillStyle="#ff0055";
            ctx.shadowColor="#ff0055"; ctx.shadowBlur=20;
            ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2-20);
        }
        ctx.shadowBlur=0; ctx.font="bold 13px sans-serif"; ctx.fillStyle="#ffcc00";
        ctx.fillText("TAP TO RETURN TO MAP",canvas.width/2,canvas.height/2+40);
    }
    requestAnimationFrame(updateAndDraw);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.onload=function(){ resize(); buildMenu(); setTimeout(resize,150); };
window.addEventListener("resize",resize);

canvas.addEventListener("click",()=>{
    if(gameState==="end"){ gameState="menu"; buildMenu(); menuScreen.style.display="flex"; }
});
backToMenuBtn.addEventListener("click",()=>{
    clearInterval(timerInterval); gameState="menu"; buildMenu(); menuScreen.style.display="flex";
});

updateAndDraw();
</script>
</body>
</html>
